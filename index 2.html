<!DOCTYPE html>
<html>

<head>

<title>Library Management</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f2f2f2;
font-family:Arial;
}

/* Hero Section */

.hero{

background:url("https://images.unsplash.com/photo-1521587760476-6c12a4b040da?q=80&w=1200") center/cover;

height:350px;

display:flex;

justify-content:center;

align-items:center;

color:white;

text-align:center;

}

.hero h1{

background:rgba(0,0,0,0.6);

padding:20px;

border-radius:10px;

}

/* Form */

.form-box{

background:white;

padding:25px;

border-radius:10px;

box-shadow:0px 0px 10px gray;

}

/* Cards Hover */

.card:hover{

transform:scale(1.05);

transition:0.4s;

}

</style>

</head>

<body>

<!-- Hero -->

<div class="hero">

<h1>

University Library Management

</h1>

</div>


<!-- Registration Form -->

<div class="container mt-5">

<div class="form-box">

<h2 class="text-center">

Membership Registration

</h2>

<form class="needs-validation" novalidate>

<div class="row">

<div class="col-md-6 mb-3">

<label>Name</label>

<input type="text"

class="form-control"

required>

</div>

<div class="col-md-6 mb-3">

<label>Email</label>

<input type="email"

class="form-control"

required>

</div>

</div>


<div class="mb-3">

<label>Department</label>

<select class="form-select"

required>

<option value="">Choose</option>

<option>CSE</option>

<option>AIML</option>

<option>ECE</option>

<option>ISE</option>

</select>

</div>


<div class="mb-3">

<label>Gender</label>

<br>

<input type="radio" name="g"> Male

<input type="radio" name="g"> Female

</div>


<div class="mb-3">

<label>Address</label>

<textarea class="form-control"

required>

</textarea>

</div>


<button class="btn btn-primary w-100">

Register

</button>

</form>

</div>

</div>



<!-- New Arrival Books -->

<div class="container mt-5">

<h2 class="text-center">

New Arrival Books

</h2>

<div class="row mt-4">

<div class="col-md-4">

<div class="card">

<img src="https://images.unsplash.com/photo-1512820790803-83ca734da794"

class="card-img-top">

<div class="card-body">

<h5>Python Book</h5>

<button class="btn btn-primary"

onclick="showBook('Python Book','Available Copies : 10')">

View

</button>

</div>

</div>

</div>


<div class="col-md-4">

<div class="card">

<img src="https://images.unsplash.com/photo-1495446815901-a7297e633e8d"

class="card-img-top">

<div class="card-body">

<h5>AI Book</h5>

<button class="btn btn-primary"

onclick="showBook('AI Book','Available Copies : 7')">

View

</button>

</div>

</div>

</div>


<div class="col-md-4">

<div class="card">

<img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f"

class="card-img-top">

<div class="card-body">

<h5>Data Structures</h5>

<button class="btn btn-primary"

onclick="showBook('Data Structures','Available Copies : 5')">

View

</button>

</div>

</div>

</div>

</div>

</div>


<!-- Opening Hours -->

<div class="container mt-5 text-center">

<h2>

Library Opening Hours

</h2>

<p>

Monday-Friday : 8AM - 8PM

</p>

<p>

Saturday : 9AM - 5PM

</p>

<p>

Sunday Closed

</p>

</div>


<!-- Dynamic Book Info -->

<div class="container mt-5">

<div class="alert alert-info text-center">

<h3 id="title">

Click View Button

</h3>

<p id="details">

Book details appear here

</p>

</div>

</div>


<script>

/* Form Validation */

(() => {

'use strict'

const forms=document.querySelectorAll('.needs-validation')

Array.from(forms).forEach(form=>{

form.addEventListener('submit',event=>{

if(!form.checkValidity()){

event.preventDefault()

event.stopPropagation()

}

form.classList.add('was-validated')

})

})

})()


/* Dynamic Book Information */

function showBook(name,info){

document.getElementById("title").innerHTML=name;

document.getElementById("details").innerHTML=info;

}

</script>

</body>

</html>
